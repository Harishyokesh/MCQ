<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}MCQ Test Portal{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3 mb-3">
  <a class="navbar-brand" href="{% if user.is_authenticated %}{% url 'dashboard-redirect' %}{% else %}{% url 'login' %}{% endif %}">📝 MCQ Test Portal</a>
  {% if user.is_authenticated %}
  <div class="d-flex align-items-center text-light">
    <span class="me-3">{{ user.username }}
      {% if user.is_staff %}<span class="badge bg-warning text-dark">Admin</span>{% endif %}
    </span>
    <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
  </div>
  {% endif %}
</nav>
<div class="container pb-5">
  {% if messages %}
    {% for m in messages %}
      <div class="alert alert-{% if m.tags == 'error' %}danger{% else %}{{ m.tags }}{% endif %} alert-dismissible fade show" role="alert">
        {{ m }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    {% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
