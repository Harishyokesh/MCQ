{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h3 class="mb-4 text-center">Admin Sign Up</h3>
        <p class="text-muted small">You need the admin signup code (set by whoever deployed this app in <code>settings.py</code> &rarr; <code>ADMIN_SIGNUP_CODE</code>).</p>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Admin Signup Code</label>
            <input type="text" name="code" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email (optional)</label>
            <input type="email" name="email" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" name="confirm" class="form-control" required>
          </div>
          <button class="btn btn-warning w-100" type="submit">Create Admin Account</button>
        </form>
        <p class="text-center mt-3 mb-0"><a href="{% url 'login' %}">Back to login</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
